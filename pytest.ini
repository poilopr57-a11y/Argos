[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -p no:cacheprovider --ignore=tests/generated
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
norecurseddirs = .git .buildozer venv .venv __pycache__ dist build node_modules tests/generated
ignore =
    tests/test_argoscore_functions.py
    tests/test_bump_version.py
    tests/test_core_ollama_bootstrap.py
    tests/test_debug_logging.py
    tests/test_git_guard.py
    tests/test_jarvis_engine.py
    tests/test_life_support.py
    tests/test_life_support_v2.py
    tests/test_messenger_bridges.py
    tests/test_ollama_timeout_autostart.py
    tests/test_p2p.py
    tests/test_platform_admin.py
    tests/test_quantum_logic_homeostasis.py
    tests/test_telegram_bot_file.py
    tests/test_telegram_bot_history_scope.py
    tests/test_telegram_bot_voice.py
    tests/test_whisper_node.py
    tests/generated/test_skill_new_skill.py
